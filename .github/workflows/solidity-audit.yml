name: Solidity Smart Contract Audit (Anthropic)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.sol'  # Only run when Solidity files change

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install @actions/core @actions/github @anthropic-ai/sdk

      - name: Run Solidity Audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node auditor.js